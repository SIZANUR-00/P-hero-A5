<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Login - Issue Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body { background: #f6f8fa; min-height: 100vh; }
    .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; background: white; }
    .login-card { max-width: 400px; width: 100%; background: white; border: 1px solid #d0d7de; border-radius: 24px; padding: 32px 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .github-logo { height: 40px; width: auto; }
    .brand-text { font-size: 28px; font-weight: 600; color: #0d1117; }
    .login-title { font-size: 28px; font-weight: 600; margin: 8px 0 4px; display: flex; align-items: center; gap: 8px; }
    .aperture-icon { height: 32px; width: auto; }
    .login-sub { color: #57606a; font-size: 16px; margin-bottom: 32px; border-left: 4px solid #1f883d; padding-left: 16px; }
    .input-group { margin-bottom: 24px; }
    .input-group label { display: block; font-weight: 600; font-size: 14px; color: #24292f; margin-bottom: 6px; }
    .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #d0d7de; border-radius: 12px; font-size: 15px; background: #f6f8fa; }
    .input-group input:focus { outline: none; border-color: #1f883d; background: white; }
    .signin-btn { width: 100%; background: #1f883d; color: white; border: none; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 40px; margin: 24px 0 16px; cursor: pointer; }
    .or-divider { display: flex; align-items: center; gap: 12px; color: #8c959f; margin: 16px 0; }
    .or-divider hr { flex: 1; border: none; border-top: 1px solid #d0d7de; }
    @media (max-width: 400px) { .login-card { padding: 24px 16px; } .brand-text { font-size: 22px; } }
  </style>
</head>
<body>
  <div class="login-page" id="loginPage">
    <div class="login-card">
      <div class="logo-row">
        <img src="assets/github-logo.png" alt="GitHub" class="github-logo" onerror="this.src='https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png'">
        <span class="brand-text">Issues Tracker</span>
      </div>
      <div class="login-title">
        <img src="assets/Aperture.png" alt="" class="aperture-icon" onerror="this.style.display='none'">
        Sign in
      </div>
      <div class="login-sub">to manage your issues</div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" value="">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" value="">
      </div>
      <button class="signin-btn" id="signinBtn">Sign In</button>
      <div class="or-divider">
        <hr> OR <hr>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('signinBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (user === 'admin' && pass === 'admin123') {
        alert('Login successful!');
      } else {
        alert('Invalid username or password');
      }
    });
  </script>
</body>
</html>
